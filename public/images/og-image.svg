<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8963E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="200" fill="#C9A84C" opacity="0.03"/>
  <circle cx="1100" cy="530" r="150" fill="#00C2FF" opacity="0.03"/>

  <!-- Main Title -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#gold)" text-anchor="middle">
    AMERICAN DREAM
  </text>

  <!-- Subtitle -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="32" fill="#ffffff" text-anchor="middle" opacity="0.9">
    Premier Retail &amp; Entertainment Destination
  </text>

  <!-- Stats -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="24" fill="#C9A84C" text-anchor="middle" letter-spacing="2">
    450+ STORES  •  40M VISITORS  •  3.1M SQ FT
  </text>

  <!-- Call to Action -->
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="28" fill="#ffffff" text-anchor="middle" opacity="0.7">
    Explore Leasing &amp; Partnership Opportunities
  </text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)"/>
</svg>
